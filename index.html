<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>kezyma.github.io</title>

    <!-- Favicons (root copy of the original ico/ set) -->
    <link rel="apple-touch-icon" sizes="120x120" href="ico/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="ico/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="ico/favicon-16x16.png">
    <link rel="manifest" href="ico/site.webmanifest">
    <link rel="mask-icon" href="ico/safari-pinned-tab.svg" color="#5bbad5">
    <link rel="shortcut icon" href="ico/favicon.ico">

    <!-- Theme + libraries (CDN) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/darkly/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0.36/dist/fancybox/fancybox.css">

    <!-- Site styles -->
    <link rel="stylesheet" href="assets/css/site.css">
</head>
<body>
    <!-- Top navbar: sidebar toggle (mobile) + brand/breadcrumb + social icons -->
    <nav class="navbar navbar-expand bg-primary fixed-top shadow-sm">
        <div class="container-fluid flex-nowrap">
            <button class="btn btn-primary d-lg-none me-2 px-2 flex-shrink-0" type="button" data-bs-toggle="offcanvas"
                    data-bs-target="#sidebar" aria-controls="sidebar" aria-label="Toggle menu">
                <i class="bi bi-list fs-4"></i>
            </button>
            <a class="navbar-brand fw-bold flex-shrink-0 me-0" href="#/" id="brand">kezyma.github.io</a>
            <div class="navbar-heading flex-grow-1" id="crumb"></div>
            <ul class="navbar-nav flex-row gap-1 flex-shrink-0 ms-2" id="social-links"></ul>
        </div>
    </nav>

    <!-- Layout: collapsible sidebar + main content -->
    <div class="layout d-flex align-items-stretch">
        <div class="offcanvas-lg offcanvas-start sidebar" tabindex="-1" id="sidebar" aria-labelledby="sidebarLabel">
            <div class="offcanvas-header border-bottom">
                <h5 class="offcanvas-title" id="sidebarLabel">Menu</h5>
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas" data-bs-target="#sidebar"
                        aria-label="Close"></button>
            </div>
            <div class="offcanvas-body p-0 d-block" id="sidebar-nav"></div>
        </div>

        <main class="content-main flex-grow-1 px-3 px-md-4 py-3" id="content"></main>
    </div>

    <!-- Libraries (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-core.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0.36/dist/fancybox/fancybox.umd.js"></script>

    <!-- Site config + app -->
    <script src="assets/js/config.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
