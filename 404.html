<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Redirecting…</title>
    <link rel="shortcut icon" href="ico/favicon.ico">
    <!--
      Compatibility layer for the rebuild.

      The previous site lived at the repo root; it now lives, unchanged, under
      /.old/. GitHub Pages serves this 404 page for any path that no longer
      exists at the root (e.g. /motogp/trueskill.html, /fightpicks.html,
      /map/<region>/map.html, or any old asset). We mirror that path into
      /.old/ so every legacy URL keeps working while content is migrated.

      Notes:
      - Legacy SPA links (/?p=<id>) are NOT handled here — index.html exists, so
        they never 404; the app translates ?p= itself.
      - The "/.old/" guard prevents a redirect loop if the path is missing in
        the archive too (then the message below is shown).
    -->
    <script>
        (function () {
            var path = window.location.pathname;
            if (path.indexOf("/.old/") !== 0) {
                window.location.replace("/.old" + path + window.location.search + window.location.hash);
            }
        })();
    </script>
    <style>
        html, body { height: 100%; margin: 0; }
        body {
            display: flex; align-items: center; justify-content: center;
            background: #222; color: #e9ecef;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            text-align: center; padding: 1.5rem;
        }
        .box { max-width: 32rem; }
        h1 { font-size: 3.5rem; margin: 0 0 .25rem; }
        a { color: #3498db; }
    </style>
</head>
<body>
    <div class="box">
        <h1>404</h1>
        <p>That page could not be found here or in the site archive.</p>
        <p><a href="/">Go to the home page</a></p>
    </div>
</body>
</html>
