<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoGP TrueSkill Ratings</title>

    <!-- Bootswatch Darkly Theme (includes Bootstrap 5) -->
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.0/dist/darkly/bootstrap.min.css" rel="stylesheet">

    <!-- DataTables CSS -->
    <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">

    <!-- Flatpickr CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">

    <style>
        body {
            padding-top: 20px;
            padding-bottom: 40px;
        }

        .chart-container {
            position: relative;
            height: 600px;
            margin-top: 20px;
        }

        .chart-resize-handle {
            height: 8px;
            background-color: #444;
            cursor: ns-resize;
            border-radius: 0 0 4px 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chart-resize-handle::after {
            content: '';
            width: 40px;
            height: 3px;
            background-color: #888;
            border-radius: 2px;
        }

        .filters {
            background-color: #303030;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .filter-group {
            margin-bottom: 15px;
        }

        .filter-group:last-child {
            margin-bottom: 0;
        }

        .filter-group label {
            font-weight: 600;
            margin-bottom: 5px;
            display: block;
        }

        #loading {
            text-align: center;
            padding: 50px;
            font-size: 1.5rem;
        }

        .spinner-border {
            width: 3rem;
            height: 3rem;
        }

        .entity-selector {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 10px;
            background-color: #222;
        }

        .entity-checkbox {
            margin-bottom: 8px;
        }

        .selected-riders {
            margin-top: 20px;
        }

        .rider-badge {
            font-size: 0.95rem;
            padding: 8px 12px;
            margin: 5px;
            display: inline-block;
        }

        .rider-badge .btn-close {
            margin-left: 8px;
            font-size: 0.7rem;
        }

        .search-container {
            position: relative;
        }

        .autocomplete-list {
            position: absolute;
            top: 100%;
            left: 0;
            z-index: 1000;
            background-color: #303030;
            border: 1px solid #444;
            border-radius: 4px;
            max-height: 200px;
            overflow-y: auto;
            width: 100%;
            display: none;
            margin-top: 2px;
        }

        .autocomplete-item {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid #444;
        }

        .autocomplete-item:hover {
            background-color: #375a7f;
        }

        .autocomplete-item:last-child {
            border-bottom: none;
        }

        .no-data-message {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: #888;
        }

        canvas {
        }

        #careerChart {
            cursor: crosshair;
        }

        .zoom-hint {
            font-size: 0.85rem;
            color: #aaa;
            margin-top: 5px;
            font-style: italic;
        }

        .header-section {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #375a7f;
        }

        .header-section h1 {
            font-weight: 700;
            margin-bottom: 10px;
        }

        .header-section p {
            color: #aaa;
            font-size: 1.1rem;
        }

        /* Statistics table borders */
        #statsTable {
            width: 100% !important;
        }

        .dataTables_wrapper .dataTables_scroll div.dataTables_scrollBody table,
        .dataTables_wrapper .dataTables_scroll div.dataTables_scrollHead table {
            width: 100% !important;
        }

        #statsTable th,
        #statsTable td {
            border: 1px solid #444 !important;
            vertical-align: middle;
        }

        #statsTable thead th {
            border-bottom: 2px solid #666 !important;
        }

        /* Active rider indicator */
        .active-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            background-color: #5cb85c;
            border-radius: 50%;
            margin-left: 8px;
        }

        /* Highlight sorted column in statistics table */
        #statsTable thead th.sorting_asc,
        #statsTable thead th.sorting_desc {
            background-color: #375a7f !important;
        }

        #statsTable tbody td.sorting_1 {
            background-color: #2a3f54 !important;
        }

        /* Prevent wrapping in rider name and years columns */
        #statsTable tbody td:nth-child(2),
        #statsTable tbody td:nth-child(3) {
            white-space: nowrap;
        }

        /* Prevent wrapping in Season Avg. header */
        #statsTable thead th:nth-child(9) {
            white-space: nowrap;
        }

        /* Make statistics table horizontally scrollable */
        .table-responsive {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* Yearly table styling */
        #yearlyTable {
            width: 100% !important;
        }

        #yearlyTable th,
        #yearlyTable td {
            border: 1px solid #444 !important;
            vertical-align: middle;
            white-space: nowrap;
        }

        #yearlyTable thead th {
            border-bottom: 2px solid #666 !important;
        }

        /* Highlight sorted column in yearly table */
        #yearlyTable thead th.sorting_asc,
        #yearlyTable thead th.sorting_desc {
            background-color: #375a7f !important;
        }

        #yearlyTable tbody td.sorting_1 {
            background-color: #2a3f54 !important;
        }

        /* Sticky year column */
        #yearlyTable th:first-child,
        #yearlyTable td:first-child {
            position: -webkit-sticky;
            position: sticky;
            left: 0;
            z-index: 10;
            border-right: 2px solid #666 !important;
        }

        #yearlyTable thead th:first-child {
            z-index: 11;
            background-color: #222 !important;
        }

        #yearlyTable tbody td:first-child {
            background-color: #303030 !important;
        }

        /* Darker background for sticky column when sorting */
        #yearlyTable tbody td:first-child.sorting_1 {
            background-color: #2a3f54 !important;
        }

        /* Stripe pattern for sticky column */
        #yearlyTable tbody tr:nth-of-type(odd) td:first-child {
            background-color: #2b2b2b !important;
        }

        #yearlyTable tbody tr:nth-of-type(odd) td:first-child.sorting_1 {
            background-color: #2a3f54 !important;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <!-- Header -->
        <div class="header-section">
            <h1>MotoGP TrueSkill Ratings</h1>
        </div>

        <!-- Loading Indicator -->
        <div id="loading">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-3">Loading data...</p>
        </div>

        <!-- Main Content (hidden until data loads) -->
        <div id="mainContent" style="display: none;">
            <!-- Navigation Tabs -->
            <div class="d-flex align-items-end">
                <ul class="nav nav-tabs flex-grow-1 mb-0" id="chartTabs" role="tablist">

                        <button class="nav-link" id="statistics-tab" data-bs-toggle="tab" data-bs-target="#statistics" type="button" role="tab" aria-controls="statistics" aria-selected="false">

                        <button class="nav-link" id="yearly-tab" data-bs-toggle="tab" data-bs-target="#yearly" type="button" role="tab" aria-controls="yearly" aria-selected="false">
                            Yearly Summary

                    </li>
                    <li class="nav-item ms-3" role="presentation">
                        <select id="ratingSystem" class="form-select form-select-sm" style="width: auto; min-width: 220px;">
                            <option value="trueskill">TrueSkill</option>
                            <option value="ttt">TrueSkill Through Time</option>

                </ul>
            </div>

            <!-- Tab Content -->
            <div class="tab-content" id="chartTabsContent">
                <!-- Ratings Tab -->
                <div class="tab-pane fade show active" id="ratings" role="tabpanel" aria-labelledby="ratings-tab">
                    <div class="filters">
                        <div class="row">
                            <div class="col-md-3">
                                <div class="filter-group">
                                    <label for="ratingsYear">Year</label>
                                    <select id="ratingsYear" class="form-select"></select>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="filter-group">
                                    <label for="ratingsType">Type</label>
                                    <select id="ratingsType" class="form-select">
                                        <option value="Rider">Rider</option>
                                        <option value="Bike">Bike</option>
                                        <option value="Combined">Combined</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="filter-group">
                                    <label for="ratingsDate">Date</label>
                                    <select id="ratingsDate" class="form-select"></select>

                        <div class="row mt-2">

                            </div>

                    </div>
                    <div class="chart-container" id="ratingsChartContainer">
                        <canvas id="ratingsChart"></canvas>
                    </div>
                    <div class="chart-resize-handle" data-target="ratingsChartContainer"></div>
                </div>

                <!-- Season Progress Tab -->
                <div class="tab-pane fade" id="season" role="tabpanel" aria-labelledby="season-tab">
                    <div class="filters">
                        <div class="row">
                            <div class="col-md-4">
                                <div class="filter-group">
                                    <label for="seasonYear">Year</label>
                                    <select id="seasonYear" class="form-select"></select>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="filter-group">
                                    <label for="seasonType">Type</label>
                                    <select id="seasonType" class="form-select">
                                        <option value="Rider">Rider</option>
                                        <option value="Bike">Bike</option>
                                        <option value="Combined">Combined</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="filter-group">
                                    <label for="seasonRating">Rating Type</label>
                                    <select id="seasonRating" class="form-select">

                                        <option value="conservative">Conservative</option>
                                        <option value="optimistic">Optimistic</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="row mt-2">
                            <div class="col-12 d-flex align-items-center gap-3">
                                <button type="button" class="btn btn-secondary btn-sm" id="resetSeasonBtn">Reset Filters</button>

                                </div>
                                <div class="entity-selector" id="seasonEntitySelector"></div>
                            </div>
                        </div>
                    </div>
                    <div class="chart-container" id="seasonChartContainer">
                        <canvas id="seasonChart"></canvas>
                    </div>
                    <div class="chart-resize-handle" data-target="seasonChartContainer"></div>
                </div>

                <!-- Career Progress Tab -->
                <div class="tab-pane fade" id="career" role="tabpanel" aria-labelledby="career-tab">
                    <div class="filters">
                        <div class="row">
                            <div class="col-md-8">
                                <div class="filter-group">
                                    <label for="careerRiderSearch">Add Rider</label>
                                    <div class="input-group search-container">
                                        <input type="text" id="careerRiderSearch" class="form-control" placeholder="Search for a rider...">
                                        <button class="btn btn-primary" type="button" id="addRiderBtn">Add</button>
                                        <div class="autocomplete-list" id="autocompleteList"></div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="filter-group">
                                    <label for="careerRating">Rating Type</label>
                                    <select id="careerRating" class="form-select">
                                        <option value="mean">Mean</option>
                                        <option value="conservative">Conservative</option>
                                        <option value="optimistic">Optimistic</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="row mt-2">
                            <div class="col-12 d-flex align-items-center gap-3">
                                <button type="button" class="btn btn-secondary btn-sm" id="resetCareerBtn">Reset Filters</button>
                                <div class="form-check form-switch mb-0">
                                    <input class="form-check-input" type="checkbox" id="careerMarkers" checked>
                                    <label class="form-check-label" for="careerMarkers">Show Markers</label>
                                </div>
                            </div>
                        </div>
                        <div class="row">

                    </div>
                    <div class="chart-container" id="careerChartContainer">

                <!-- Statistics Tab -->

                        <div class="row">
                            <div class="col-md-4">
                                <div class="filter-group">
                                    <label for="statsStartDate">Start Date</label>
                                    <input type="text" id="statsStartDate" class="form-control" placeholder="Select start date...">
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="filter-group">
                                    <label for="statsEndDate">End Date</label>
                                    <input type="text" id="statsEndDate" class="form-control" placeholder="Select end date...">
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="filter-group">
                                    <label for="statsRating">Rating Type</label>
                                    <select id="statsRating" class="form-select">
                                        <option value="conservative">Conservative</option>
                                        <option value="mean">Mean</option>
                                        <option value="optimistic">Optimistic</option>

                                </div>

                                    <th>Rating</th>
                                    <th>2nd Place Rider</th>
                                    <th>Rating</th>
                                    <th>3rd Place Rider</th>
                                    <th>Rating</th>
                                    <th>Best Bike</th>
                                    <th>Rating</th>
                                </tr>
                            </thead>
                            <tbody id="yearlyTableBody">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>

    <!-- DataTables JS -->
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

    <!-- Flatpickr JS -->
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <!-- Bootstrap Bundle (includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <!-- Chart.js Date Adapter -->
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>

    <!-- Chart.js Data Labels Plugin -->
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>

    <!-- Chart.js Zoom Plugin -->
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>

    <script>
        // Global data store
        const appData = {
            rawData: [],
            years: [],
            riders: {},
            bikes: {},
            yearData: {},
            allRiderNames: [],
            ridersByPeakRating: [] // Sorted by peak conservative rating
        };

        // URL Query String Management
        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            const result = {};
            for (const [key, value] of params) {
                result[key] = value;
            }
            return result;
        }

        function setUrlParam(key, value) {
            const url = new URL(window.location);
            if (value === null || value === undefined || value === '') {
                url.searchParams.delete(key);
            } else {
                url.searchParams.set(key, value);
            }
            window.history.replaceState({}, '', url);
        }

        function setUrlParams(params) {
            const url = new URL(window.location);
            for (const [key, value] of Object.entries(params)) {
                if (value === null || value === undefined || value === '') {
                    url.searchParams.delete(key);
                } else {
                    url.searchParams.set(key, value);
                }
            }
            window.history.replaceState({}, '', url);
        }

        function clearAllUrlParams() {
            const url = new URL(window.location);
            const system = url.searchParams.get('system');
            url.search = '';
            if (system) {
                url.searchParams.set('system', system);
            }
            window.history.replaceState({}, '', url);
        }

        // Global Chart.js plugin: fill canvas background so saved images aren't transparent
        Chart.register({
            id: 'customCanvasBackgroundColor',
            beforeDraw: (chart) => {
                const {ctx} = chart;
                ctx.save();
                ctx.globalCompositeOperation = 'destination-over';
                ctx.fillStyle = '#222';
                ctx.fillRect(0, 0, chart.width, chart.height);
                ctx.restore();
            }
        });

        // Rating system configuration
        const RATING_SYSTEMS = {
            trueskill: { file: 'MotoGP_TrueSkill_Default.csv', label: 'TrueSkill' },
            ttt: { file: 'TTT_MotoGP_History.csv', label: 'TrueSkill Through Time' }
        };

        function getCurrentSystem() {
            const params = getUrlParams();
            return params.system || 'trueskill';
        }

        // Save tab state functions
        function saveRatingsStateToUrl() {
            setUrlParams({
                ratingsYear: $('#ratingsYear').val(),
                ratingsType: $('#ratingsType').val(),
                ratingsDate: $('#ratingsDate').val(),
                ratingsSort: $('#ratingsSort').val()
            });
        }

        function saveSeasonStateToUrl() {
            // Get indices of selected entities
            const selectedIndices = [];
            $('.season-entity-check').each(function(index) {
                if ($(this).is(':checked')) {
                    selectedIndices.push(index);
                }
            });

            setUrlParams({
                seasonYear: $('#seasonYear').val(),
                seasonType: $('#seasonType').val(),
                seasonRating: $('#seasonRating').val(),
                seasonEntities: selectedIndices.length > 0 ? selectedIndices.join(',') : '',
                seasonMarkers: $('#seasonMarkers').is(':checked') ? 'on' : 'off'
            });
        }

        // CSV Loading and Parsing
        async function loadCSV() {
            try {
                const system = getCurrentSystem();
                const csvFile = RATING_SYSTEMS[system].file;
                const response = await fetch(csvFile);
                const csvText = await response.text();
                parseCSV(csvText);
                buildIndexes();
                initializeUI();
                $('#loading').hide();
                $('#mainContent').show();

                // Update page title to reflect current system
                const label = RATING_SYSTEMS[system].label;
                $('h1').text('MotoGP ' + label + ' Ratings');
                document.title = 'MotoGP ' + label + ' Ratings';
            } catch (error) {
                console.error('Error loading CSV:', error);
                const csvFile = RATING_SYSTEMS[getCurrentSystem()].file;
                $('#loading').html('<div class="alert alert-danger">Error loading data. Please make sure ' + csvFile + ' is in the same directory.</div>');
            }
        }

        function parseCSV(csvText) {
            const lines = csvText.split('\n');
            const headers = lines[0].replace('\ufeff', '').split(','); // Remove BOM if present

            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;

                const values = line.split(',');
                if (values.length < headers.length) continue;

                const record = {};
                headers.forEach((header, index) => {
                    record[header.trim()] = values[index] ? values[index].trim() : '';
                });

                // Convert numeric fields
                record.Mean = parseFloat(record.Mean);
                record.StdDev = parseFloat(record.StdDev);
                record.Id = parseInt(record.Id);
                record.Order = parseInt(record.Order);

                // Normalize date format: convert DD/MM/YYYY HH:MM:SS to YYYY-MM-DD
                if (record.Date && record.Date.includes('/')) {
                    const datePart = record.Date.split(' ')[0];
                    const parts = datePart.split('/');
                    if (parts.length === 3) {
                        record.Date = parts[2] + '-' + parts[1].padStart(2, '0') + '-' + parts[0].padStart(2, '0');
                    }
                }

                appData.rawData.push(record);
            }
        }

        function buildIndexes() {
            // Extract unique years
            const yearSet = new Set();
            appData.rawData.forEach(record => {
                const year = new Date(record.Date).getFullYear();
                yearSet.add(year);
            });
            appData.years = Array.from(yearSet).sort((a, b) => b - a); // Descending order

            // Group by rider name
            appData.rawData.forEach(record => {
                if (record.Type === 'Rider') {
                    if (!appData.riders[record.Name]) {
                        appData.riders[record.Name] = [];
                    }
                    appData.riders[record.Name].push(record);
                }

                if (record.Type === 'Bike') {
                    if (!appData.bikes[record.Name]) {
                        appData.bikes[record.Name] = [];
                    }
                    appData.bikes[record.Name].push(record);
                }
            });

            // Sort records by date for each rider/bike
            Object.keys(appData.riders).forEach(name => {
                appData.riders[name].sort((a, b) => new Date(a.Date) - new Date(b.Date));
            });
            Object.keys(appData.bikes).forEach(name => {
                appData.bikes[name].sort((a, b) => new Date(a.Date) - new Date(b.Date));
            });

            // Build year data index
            appData.years.forEach(year => {
                appData.yearData[year] = {
                    riders: {},
                    bikes: {}
                };
            });

            appData.rawData.forEach(record => {
                const year = new Date(record.Date).getFullYear();
                if (record.Type === 'Rider') {
                    if (!appData.yearData[year].riders[record.Name]) {
                        appData.yearData[year].riders[record.Name] = [];
                    }
                    appData.yearData[year].riders[record.Name].push(record);
                } else if (record.Type === 'Bike') {
                    if (!appData.yearData[year].bikes[record.Name]) {
                        appData.yearData[year].bikes[record.Name] = [];
                    }
                    appData.yearData[year].bikes[record.Name].push(record);
                }
            });

            // Get all rider names for autocomplete
            appData.allRiderNames = Object.keys(appData.riders).sort();

            // Calculate peak conservative rating for each rider and sort
            // Filter to only include riders with at least 2 ratings (career progression)
            appData.ridersByPeakRating = Object.keys(appData.riders)
                .filter(riderName => appData.riders[riderName].length >= 2)
                .map(riderName => {
                    const records = appData.riders[riderName];
                    let peakConservative = -Infinity;

                    records.forEach(record => {
                        const conservative = getConservative(record.Mean, record.StdDev);
                        if (conservative > peakConservative) {
                            peakConservative = conservative;
                        }
                    });

                    return {
                        name: riderName,
                        peakConservative: peakConservative
                    };
                }).sort((a, b) => b.peakConservative - a.peakConservative);
        }

        // Helper functions for rating calculations
        function getConservative(mean, stddev) {
            return mean - 3 * stddev;
        }

        function getOptimistic(mean, stddev) {
            return mean + 3 * stddev;
        }

        function getRatingValue(record, ratingType) {
            switch(ratingType) {
                case 'conservative':
                    return getConservative(record.Mean, record.StdDev);
                case 'optimistic':
                    return getOptimistic(record.Mean, record.StdDev);
                case 'mean':
                default:
                    return record.Mean;
            }
        }

        // Remove year brackets from bike names
        function removeBikeYear(bikeName) {
            if (!bikeName) return bikeName;
            return bikeName.replace(/\s*\[\d{4}\]\s*$/, '').trim();
        }

        // Combine rider and bike ratings using TrueSkill formulas
        function combineRatings(riderRecord, bikeRecord) {
            if (!riderRecord || !bikeRecord) return null;

            // Combined Mean = Sum of Rider Mean and Bike Mean
            const combinedMean = riderRecord.Mean + bikeRecord.Mean;

            // Combined StdDev = sqrt(Rider StdDev^2 + Bike StdDev^2)
            const combinedStdDev = Math.sqrt(
                Math.pow(riderRecord.StdDev, 2) + Math.pow(bikeRecord.StdDev, 2)
            );

            const bikeName = removeBikeYear(bikeRecord.Name);

            return {
                Id: riderRecord.Id,
                Type: 'Combined',
                Name: `${riderRecord.Name} (${bikeName})`,
                Mean: combinedMean,
                StdDev: combinedStdDev,
                Date: riderRecord.Date,
                Order: riderRecord.Order,
                Bike: bikeRecord.Name,
                Series: riderRecord.Series
            };
        }

        // Get latest rating for each entity in a year
        function getLatestRatingByYear(year, type) {
            const result = {};

            if (type === 'Combined') {
                // For combined, we need to combine rider + their latest bike
                const riders = appData.yearData[year]?.riders || {};
                const bikes = appData.yearData[year]?.bikes || {};

                Object.keys(riders).forEach(riderName => {
                    const riderRecords = riders[riderName];
                    if (riderRecords.length > 0) {
                        const latestRider = riderRecords[riderRecords.length - 1];

                        if (latestRider.Bike) {
                            const bikeRecords = bikes[latestRider.Bike] || [];
                            if (bikeRecords.length > 0) {
                                const latestBike = bikeRecords[bikeRecords.length - 1];
                                const combined = combineRatings(latestRider, latestBike);

                                if (combined) {
                                    // Store by rider name for year-over-year comparison
                                    result[riderName] = combined;
                                }
                            }
                        }
                    }
                });
            } else {
                const source = type === 'Rider' ?
                    (appData.yearData[year]?.riders || {}) :
                    (appData.yearData[year]?.bikes || {});

                Object.keys(source).forEach(name => {
                    const records = source[name];
                    if (records.length > 0) {
                        // Get the latest record (records are sorted by date)
                        result[name] = records[records.length - 1];
                    }
                });
            }

            return result;
        }

        // Get ratings by specific date
        function getRatingsByDate(year, type, date) {
            const result = {};

            if (type === 'Combined') {
                // For combined, we need to combine rider + their bike
                const riders = appData.yearData[year]?.riders || {};
                const bikes = appData.yearData[year]?.bikes || {};

                Object.keys(riders).forEach(riderName => {
                    const riderRecords = riders[riderName];

                    // Find rider's record at this date
                    let riderRecord = null;
                    for (let i = riderRecords.length - 1; i >= 0; i--) {
                        if (riderRecords[i].Date <= date) {
                            riderRecord = riderRecords[i];
                            break;
                        }
                    }

                    if (riderRecord && riderRecord.Bike) {
                        // Find the bike's record at this date
                        const bikeName = riderRecord.Bike;
                        const bikeRecords = bikes[bikeName] || [];

                        let bikeRecord = null;
                        for (let i = bikeRecords.length - 1; i >= 0; i--) {
                            if (bikeRecords[i].Date <= date) {
                                bikeRecord = bikeRecords[i];
                                break;
                            }
                        }

                        if (bikeRecord) {
                            const combined = combineRatings(riderRecord, bikeRecord);
                            if (combined) {
                                // Store by rider name for year-over-year comparison
                                result[riderName] = combined;
                            }
                        }
                    }
                });
            } else {
                const source = type === 'Rider' ?
                    (appData.yearData[year]?.riders || {}) :
                    (appData.yearData[year]?.bikes || {});

                Object.keys(source).forEach(name => {
                    const records = source[name];
                    // Find the record for the specific date, or the most recent before it
                    let targetRecord = null;
                    for (let i = records.length - 1; i >= 0; i--) {
                        if (records[i].Date <= date) {
                            targetRecord = records[i];
                            break;
                        }
                    }
                    if (targetRecord) {
                        // Remove year from bike names in display
                        if (type === 'Bike') {
                            targetRecord = {...targetRecord, Name: removeBikeYear(targetRecord.Name)};
                        }
                        result[name] = targetRecord;
                    }
                });
            }

            return result;
        }

        // Calculate year-over-year change
        function calculateYearChange(name, year, type, currentRecord) {
            const previousYear = getLatestRatingByYear(year - 1, type);

            if (currentRecord && previousYear[name]) {
                return currentRecord.Mean - previousYear[name].Mean;
            }

            return null;
        }

        function populateRatingsDates() {
            const year = parseInt($('#ratingsYear').val());
            const type = $('#ratingsType').val();

            // Get all unique dates for the year/type combination
            const dates = new Set();

            if (type === 'Combined') {
                if (appData.yearData[year]) {
                    Object.values(appData.yearData[year].riders).forEach(records => {
                        records.forEach(r => dates.add(r.Date));
                    });
                    Object.values(appData.yearData[year].bikes).forEach(records => {
                        records.forEach(r => dates.add(r.Date));
                    });
                }
            } else {
                const source = type === 'Rider' ?
                    (appData.yearData[year]?.riders || {}) :
                    (appData.yearData[year]?.bikes || {});

                Object.values(source).forEach(records => {
                    records.forEach(r => dates.add(r.Date));
                });
            }

            // Sort dates in descending order (most recent first)
            const sortedDates = Array.from(dates).sort((a, b) => new Date(b) - new Date(a));

            const dateOptions = sortedDates.map(date => {
                const dateObj = new Date(date);
                const formatted = dateObj.toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric'
                });
                return `<option value="${date}">${formatted}</option>`;
            }).join('');

            $('#ratingsDate').html(dateOptions);
        }

        // Chart 1: Ratings Bar Chart
        function renderRatingsChart() {
            const year = parseInt($('#ratingsYear').val());
            const type = $('#ratingsType').val();
            const selectedDate = $('#ratingsDate').val();
            const sortBy = $('#ratingsSort').val();

            const ratings = getRatingsByDate(year, type, selectedDate);
            const data = Object.values(ratings);

            // Calculate values for sorting
            // For combined, we need to extract rider name for year-over-year comparison
            const dataWithValues = data.map(d => {
                let nameForComparison = d.Name;

                // For combined type, extract rider name from "Rider (Bike)" format
                if (type === 'Combined' && d.Type === 'Combined') {
                    // The data is already stored by rider name in the result object
                    // but d.Name contains the full "Rider (Bike)" format
                    // We need to get the actual key used to store it
                    const riderMatch = Object.keys(ratings).find(key => ratings[key] === d);
                    if (riderMatch) {
                        nameForComparison = riderMatch;
                    }
                }

                return {
                    ...d,
                    conservative: getConservative(d.Mean, d.StdDev),
                    mean: d.Mean,
                    optimistic: getOptimistic(d.Mean, d.StdDev),
                    change: calculateYearChange(nameForComparison, year, d.Type, d)
                };
            });

            // Sort based on selected criterion
            dataWithValues.sort((a, b) => {
                switch(sortBy) {
                    case 'conservative':
                        return b.conservative - a.conservative;
                    case 'optimistic':
                        return b.optimistic - a.optimistic;
                    case 'change':
                        const changeA = a.change !== null ? a.change : -Infinity;
                        const changeB = b.change !== null ? b.change : -Infinity;
                        return changeB - changeA;
                    case 'mean':
                    default:
                        return b.mean - a.mean;
                }
            });

            // Take top 30 (or all if less)
            const displayData = dataWithValues.slice(0, 30);

            // Create labels without change information
            const labels = displayData.map(d => d.Name);

            // Store changes for the custom plugin
            const changes = displayData.map(d => d.change);

            // Create floating bar data (from conservative to optimistic)
            const barData = displayData.map(d => [d.conservative, d.optimistic]);

            // Create scatter data for the three points
            const conservativePoints = displayData.map(d => d.conservative);
            const meanPoints = displayData.map(d => d.mean);
            const optimisticPoints = displayData.map(d => d.optimistic);

            // Destroy existing chart
            if (ratingsChartInstance) {
                ratingsChartInstance.destroy();
            }

            // Custom plugin to draw vertical lines, values, and changes
            const verticalLinesAndChangesPlugin = {
                id: 'verticalLinesAndChanges',
                afterDatasetsDraw: function(chart) {
                    const ctx = chart.ctx;
                    const xScale = chart.scales.x;
                    const yScale = chart.scales.y;

                    ctx.save();
                    ctx.textBaseline = 'middle';
                    ctx.font = '12px sans-serif';

                    // Draw vertical lines and values for each rating point
                    displayData.forEach((d, index) => {
                        const y = yScale.getPixelForValue(index);
                        const barHeight = 18;

                        // Conservative line (red) - always visible
                        const consX = xScale.getPixelForValue(d.conservative);
                        ctx.strokeStyle = 'rgba(220, 53, 69, 1)';
                        ctx.lineWidth = 3;
                        ctx.beginPath();
                        ctx.moveTo(consX, y - barHeight/2);
                        ctx.lineTo(consX, y + barHeight/2);
                        ctx.stroke();

                        // Conservative value - toggle based on visibility state
                        if (ratingsValueVisibility.conservative) {
                            ctx.fillStyle = '#fff';
                            ctx.textAlign = 'right';
                            ctx.fillText(d.conservative.toFixed(2), consX - 5, y);
                        }

                        // Mean line (blue) - always visible
                        const meanX = xScale.getPixelForValue(d.mean);
                        ctx.strokeStyle = 'rgba(13, 110, 253, 1)';
                        ctx.lineWidth = 3;
                        ctx.beginPath();
                        ctx.moveTo(meanX, y - barHeight/2);
                        ctx.lineTo(meanX, y + barHeight/2);
                        ctx.stroke();

                        // Mean value - toggle based on visibility state
                        if (ratingsValueVisibility.mean) {
                            ctx.fillStyle = '#fff';
                            ctx.textAlign = 'right';
                            ctx.fillText(d.mean.toFixed(2), meanX - 5, y);
                        }

                        // Optimistic line (green) - always visible
                        const optX = xScale.getPixelForValue(d.optimistic);
                        ctx.strokeStyle = 'rgba(25, 135, 84, 1)';
                        ctx.lineWidth = 3;
                        ctx.beginPath();
                        ctx.moveTo(optX, y - barHeight/2);
                        ctx.lineTo(optX, y + barHeight/2);
                        ctx.stroke();

                        // Optimistic value - toggle based on visibility state
                        if (ratingsValueVisibility.optimistic) {
                            ctx.fillStyle = '#fff';
                            ctx.textAlign = 'right';
                            ctx.fillText(d.optimistic.toFixed(2), optX - 5, y);
                        }
                    });

                    // Draw changes to the right of the bar
                    ctx.font = '12px sans-serif';
                    ctx.textAlign = 'left';

                    changes.forEach((change, index) => {
                        if (change !== null) {
                            const d = displayData[index];
                            const y = yScale.getPixelForValue(index);
                            const optX = xScale.getPixelForValue(d.optimistic);
                            const x = optX + 10; // 10px to the right of optimistic line

                            const sign = change > 0 ? '+' : '';
                            const text = `${sign}${change.toFixed(1)}`;

                            // Color based on positive/negative
                            ctx.fillStyle = change > 0 ? '#5cb85c' : (change < 0 ? '#d9534f' : '#aaa');
                            ctx.fillText(text, x, y);
                        }
                    });

                    ctx.restore();
                }
            };

            const ctx = document.getElementById('ratingsChart').getContext('2d');
            ratingsChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            type: 'bar',
                            label: 'Range',
                            data: barData,
                            backgroundColor: 'rgba(25, 135, 84, 0.25)',
                            borderColor: 'rgba(25, 135, 84, 0.4)',
                            borderWidth: 1,
                            barThickness: 20,
                            datalabels: {
                                display: false
                            }
                        },
                        {
                            type: 'scatter',
                            label: 'Conservative',
                            data: conservativePoints,
                            backgroundColor: 'transparent',
                            borderColor: 'transparent',
                            pointRadius: 0,
                            pointBorderWidth: 0,
                            datalabels: {
                                display: false
                            }
                        },
                        {
                            type: 'scatter',
                            label: 'Mean',
                            data: meanPoints,
                            backgroundColor: 'transparent',
                            borderColor: 'transparent',
                            pointRadius: 0,
                            pointBorderWidth: 0,
                            datalabels: {
                                display: false
                            }
                        },
                        {
                            type: 'scatter',
                            label: 'Optimistic',
                            data: optimisticPoints,
                            backgroundColor: 'transparent',
                            borderColor: 'transparent',
                            pointRadius: 0,
                            pointBorderWidth: 0,
                            datalabels: {
                                display: false
                            }
                        }
                    ]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top',
                            labels: {
                                color: '#fff',
                                filter: function(item) {
                                    return item.text !== 'Range'; // Hide the range bar from legend
                                },
                                generateLabels: function(chart) {
                                    return [
                                        {
                                            text: 'Conservative',
                                            fillStyle: 'rgba(220, 53, 69, 1)',
                                            strokeStyle: 'rgba(220, 53, 69, 1)',
                                            lineWidth: 3,
                                            fontColor: '#fff',
                                            hidden: !ratingsValueVisibility.conservative,
                                            datasetIndex: 1
                                        },
                                        {
                                            text: 'Mean',
                                            fillStyle: 'rgba(13, 110, 253, 1)',
                                            strokeStyle: 'rgba(13, 110, 253, 1)',
                                            lineWidth: 3,
                                            fontColor: '#fff',
                                            hidden: !ratingsValueVisibility.mean,
                                            datasetIndex: 2
                                        },
                                        {
                                            text: 'Optimistic',
                                            fillStyle: 'rgba(25, 135, 84, 1)',
                                            strokeStyle: 'rgba(25, 135, 84, 1)',
                                            lineWidth: 3,
                                            fontColor: '#fff',
                                            hidden: !ratingsValueVisibility.optimistic,
                                            datasetIndex: 3
                                        }
                                    ];
                                }
                            },
                            onClick: function(e, legendItem, legend) {
                                const index = legendItem.datasetIndex;
                                const labels = ['', 'conservative', 'mean', 'optimistic'];
                                const key = labels[index];

                                if (key) {
                                    // Toggle visibility
                                    ratingsValueVisibility[key] = !ratingsValueVisibility[key];

                                    // Update the chart
                                    legend.chart.update();
                                }
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    if (context.dataset.type === 'bar') {
                                        return null;
                                    }
                                    return `${context.dataset.label}: ${context.parsed.x.toFixed(2)}`;
                                }
                            }
                        },
                        datalabels: {
                            display: true
                        }
                    },
                    scales: {
                        x: {
                            beginAtZero: false,
                            grid: {
                                color: 'rgba(255, 255, 255, 0.1)'
                            },
                            ticks: {
                                color: '#fff'
                            }

        // Chart 2: Season Progress
        function populateSeasonEntitySelector() {
            const year = parseInt($('#seasonYear').val());
            const type = $('#seasonType').val();

            let entitiesWithRatings = [];

            if (type === 'Combined') {
                // For combined, create rider+bike entities
                const riders = appData.yearData[year].riders;

                Object.keys(riders).forEach(riderName => {
                    const riderRecords = riders[riderName];

                    // Only include if rider has at least 2 ratings in this season
                    if (riderRecords.length < 2) return;

                    const latestRider = riderRecords[riderRecords.length - 1];

                    if (latestRider.Bike) {
                        const bikeName = latestRider.Bike;
                        const bikeRecords = appData.yearData[year].bikes[bikeName];

                        // Only include if bike has at least 2 ratings in this season
                        if (bikeRecords && bikeRecords.length >= 2) {
                            const latestBike = bikeRecords[bikeRecords.length - 1];
                            const combined = combineRatings(latestRider, latestBike);

                            if (combined) {
                                entitiesWithRatings.push({
                                    name: riderName, // Store rider name for lookups
                                    displayName: combined.Name,
                                    rating: combined.Mean,
                                    isCombined: true
                                });
                            }
                        }
                    }
                });
            } else {
                const data = type === 'Rider' ? appData.yearData[year].riders : appData.yearData[year].bikes;

                // Get entities sorted by their latest mean rating (descending)
                // Only include entities with at least 2 ratings in this season
                entitiesWithRatings = Object.keys(data)
                    .filter(entity => data[entity].length >= 2)
                    .map(entity => {
                        const records = data[entity];
                        const latestRecord = records[records.length - 1];
                        const displayName = type === 'Bike' ? removeBikeYear(entity) : entity;
                        return {
                            name: entity,
                            displayName: displayName,
                            rating: latestRecord.Mean,
                            isCombined: false
                        };
                    });
            }

            entitiesWithRatings.sort((a, b) => b.rating - a.rating);

            // Determine which should be checked
            let checkedIndices;
            const params = getUrlParams();

            if (params.seasonEntities) {
                // Use indices from URL if available
                checkedIndices = params.seasonEntities.split(',').map(i => parseInt(i.trim())).filter(i => !isNaN(i));
            } else {
                // Otherwise use default logic
                if (type === 'Bike') {
                    // All bikes checked by default
                    checkedIndices = entitiesWithRatings.map((e, idx) => idx);
                } else {
                    // Top 5 for Rider and Combined
                    checkedIndices = [0, 1, 2, 3, 4].filter(idx => idx < entitiesWithRatings.length);
                }
            }

            let html = '';
            entitiesWithRatings.forEach((entity, index) => {
                const isChecked = checkedIndices.includes(index);
                const checked = isChecked ? 'checked' : '';
                const safeId = entity.name.replace(/\s+/g, '-').replace(/\[/g, '').replace(/\]/g, '').replace(/\(/g, '').replace(/\)/g, '');
                html += `
                    <div class="form-check entity-checkbox">
                        <input class="form-check-input season-entity-check" type="checkbox" value="${entity.name}" data-combined="${entity.isCombined}" id="entity-${safeId}" ${checked}>
                        <label class="form-check-label" for="entity-${safeId}">
                            ${entity.displayName}
                        </label>
                    </div>
                `;
            });

            $('#seasonEntitySelector').html(html);

            // Add event handlers
            $('.season-entity-check').on('change', function() {
                saveSeasonStateToUrl();
                renderSeasonChart();
            });
        }

        // Utility function to generate distinct colors
        function generateColors(count) {
            const colors = [];
            const hueStep = 360 / count;

            for (let i = 0; i < count; i++) {
                const hue = i * hueStep;
                colors.push(`hsl(${hue}, 70%, 60%)`);
            }

            return colors;
        }

        // Chart 4: Statistics Table
        let startDatePicker, endDatePicker;
        let mostRecentRatingYear = null;

        function populateStatsDates() {
            // Destroy existing date pickers if they exist
            if (startDatePicker) {
                startDatePicker.destroy();
            }
            if (endDatePicker) {
                endDatePicker.destroy();
            }

            // Calculate the most recent rating year across all data
            let maxYear = 0;
            appData.rawData.forEach(record => {
                if (record.Type === 'Rider') {
                    const year = new Date(record.Date).getFullYear();
                    if (year > maxYear) {
                        maxYear = year;
                    }
                }
            });
            mostRecentRatingYear = maxYear;

            // Get URL params to check for saved dates
            const params = getUrlParams();
            const startDateDefault = params.statsStartDate || "2002-01-01";
            const endDateDefault = params.statsEndDate || new Date();

            // Initialize start date picker
            startDatePicker = flatpickr("#statsStartDate", {
                dateFormat: "Y-m-d",
                defaultDate: startDateDefault,
                theme: "dark",
                allowInput: true,
                onChange: function(selectedDates, dateStr, instance) {
                    saveStatsStateToUrl();
                    renderStatisticsTable();
                }
            });

            // Initialize end date picker
            endDatePicker = flatpickr("#statsEndDate", {
                dateFormat: "Y-m-d",
                defaultDate: endDateDefault,
                theme: "dark",
                allowInput: true,
                onChange: function(selectedDates, dateStr, instance) {
                    saveStatsStateToUrl();
                    renderStatisticsTable();
                }
            });
        }

        function renderStatisticsTable() {
            const startDateVal = $('#statsStartDate').val();
            const endDateVal = $('#statsEndDate').val();

            // Don't render if dates aren't set yet
            if (!startDateVal || !endDateVal) return;

            const startDate = new Date(startDateVal);
            const endDate = new Date(endDateVal);
            const ratingType = $('#statsRating').val();

            // Get all riders and their records within the date range
            const riderStats = {};

            Object.keys(appData.riders).forEach(riderName => {
                const records = appData.riders[riderName].filter(record => {
                    const recordDate = new Date(record.Date);
                    return recordDate >= startDate && recordDate <= endDate;
                });

                if (records.length === 0) return;

                // Calculate rating values for each record
                const ratings = records.map(record => {
                    if (ratingType === 'conservative') {
                        return getConservative(record.Mean, record.StdDev);
                    } else if (ratingType === 'mean') {
                        return record.Mean;
                    } else {
                        return getOptimistic(record.Mean, record.StdDev);
                    }
                });

                // Basic statistics
                const lowest = Math.min(...ratings);
                const highest = Math.max(...ratings);
                const average = ratings.reduce((a, b) => a + b, 0) / ratings.length;

                // Median
                const sortedRatings = [...ratings].sort((a, b) => a - b);
                const median = sortedRatings.length % 2 === 0
                    ? (sortedRatings[sortedRatings.length / 2 - 1] + sortedRatings[sortedRatings.length / 2]) / 2
                    : sortedRatings[Math.floor(sortedRatings.length / 2)];

                // Years
                const years = records.map(r => new Date(r.Date).getFullYear());
                const earliestYear = Math.min(...years);
                const latestYear = Math.max(...years);

                // Season average calculation
                let bestSeasonAvg = -Infinity;
                let bestSeasonYear = null;

                // Group records by year
                const recordsByYear = {};
                records.forEach(record => {
                    const year = new Date(record.Date).getFullYear();
                    if (!recordsByYear[year]) {
                        recordsByYear[year] = [];
                    }
                    recordsByYear[year].push(record);
                });

                // Get all dates in the date range for calculating possible races per year
                const allDatesInRange = new Set();
                appData.rawData.forEach(record => {
                    if (record.Type === 'Rider') {
                        const recordDate = new Date(record.Date);
                        if (recordDate >= startDate && recordDate <= endDate) {
                            allDatesInRange.add(record.Date);
                        }
                    }
                });

                // Group all dates by year to calculate possible races per year
                const datesByYear = {};
                allDatesInRange.forEach(date => {
                    const year = new Date(date).getFullYear();
                    if (!datesByYear[year]) {
                        datesByYear[year] = [];
                    }
                    datesByYear[year].push(date);
                });

                // Calculate best season average
                Object.keys(recordsByYear).forEach(year => {
                    const yearRecords = recordsByYear[year];
                    const possibleRaces = datesByYear[year]?.length || 0;
                    const requiredRaces = Math.ceil(possibleRaces / 3);

                    if (yearRecords.length >= requiredRaces) {
                        const yearRatings = yearRecords.map(record => {
                            if (ratingType === 'conservative') {
                                return getConservative(record.Mean, record.StdDev);
                            } else if (ratingType === 'mean') {
                                return record.Mean;
                            } else {
                                return getOptimistic(record.Mean, record.StdDev);
                            }
                        });

                        const yearAvg = yearRatings.reduce((a, b) => a + b, 0) / yearRatings.length;

                        if (yearAvg > bestSeasonAvg) {
                            bestSeasonAvg = yearAvg;
                            bestSeasonYear = year;
                        }
                    }
                });

                // Check if rider has a rating in the most recent year
                const hasRecentRating = records.some(record => {
                    return new Date(record.Date).getFullYear() === mostRecentRatingYear;
                });

                riderStats[riderName] = {
                    name: riderName,
                    years: `${earliestYear}-${latestYear}`,
                    races: records.length,
                    lowest: lowest,
                    highest: highest,
                    average: average,
                    median: median,
                    seasonAvg: bestSeasonYear ? bestSeasonAvg : null,
                    season: bestSeasonYear,
                    isActive: hasRecentRating
                };
            });

            // Sort by rider name
            const sortedStats = Object.values(riderStats).sort((a, b) =>
                a.name.localeCompare(b.name)
            );

            // Destroy existing DataTable if it exists
            if ($.fn.DataTable.isDataTable('#statsTable')) {
                $('#statsTable').DataTable().destroy();
            }

            // Render table
            let html = '';
            sortedStats.forEach((stat) => {
                const rowClass = stat.isActive ? 'fw-bold' : '';
                const activeIcon = stat.isActive ? '<span class="active-indicator"></span>' : '';
                html += `
                    <tr class="${rowClass}">
                        <td></td>
                        <td>${stat.name} ${activeIcon}</td>
                        <td>${stat.years}</td>
                        <td>${stat.races}</td>
                        <td>${stat.lowest.toFixed(2)}</td>
                        <td>${stat.highest.toFixed(2)}</td>
                        <td>${stat.average.toFixed(2)}</td>
                        <td>${stat.median.toFixed(2)}</td>
                        <td>${stat.seasonAvg !== null ? stat.seasonAvg.toFixed(2) : 'N/A'}</td>
                        <td>${stat.season !== null ? stat.season : 'N/A'}</td>
                    </tr>
                `;
            });

            $('#statsTableBody').html(html);

            // Initialize DataTables with default sort by Highest column (index 5) descending
            const table = $('#statsTable').DataTable({
                order: [[5, 'desc']], // Sort by Highest column
                pageLength: 25,
                lengthMenu: [[10, 25, 50, 100, -1], [10, 25, 50, 100, "All"]],
                scrollX: true,
                columnDefs: [
                    {
                        targets: 0, // # column
                        orderable: false,
                        searchable: false
                    }
                ],
                language: {
                    search: "Search riders:",
                    lengthMenu: "Show _MENU_ riders per page",
                    info: "Showing _START_ to _END_ of _TOTAL_ riders",
                    infoEmpty: "No riders to display",
                    infoFiltered: "(filtered from _MAX_ total riders)"
                },
                initComplete: function(settings, json) {
                    // Adjust columns after initialization to ensure proper alignment
                    const api = this.api();
                    setTimeout(function() {
                        api.columns.adjust();
                    }, 100);
                },
                drawCallback: function(settings) {
                    // Update row numbers based on current display order
                    const api = this.api();
                    const start = api.page.info().start;
                    api.column(0, {page: 'current'}).nodes().each(function(cell, i) {
                        cell.innerHTML = start + i + 1;
                    });
                }
            });
        }

        // Yearly Summary Table
        function renderYearlyTable() {
            const ratingType = $('#yearlyRating').val();
            const valueType = $('#yearlyValue').val();

            // Calculate data for each year
            const yearlyData = [];

            appData.years.forEach(year => {
                const riders = appData.yearData[year]?.riders || {};
                const bikes = appData.yearData[year]?.bikes || {};

                // Get all unique dates for this year
                const allDatesInYear = new Set();
                Object.values(riders).forEach(records => {
                    records.forEach(r => allDatesInYear.add(r.Date));
                });
                Object.values(bikes).forEach(records => {
                    records.forEach(r => allDatesInYear.add(r.Date));
                });

                const totalDates = allDatesInYear.size;
                const requiredDates = Math.ceil(totalDates / 3);

                // Calculate rider values based on valueType
                const riderValues = {};
                Object.keys(riders).forEach(riderName => {
                    const records = riders[riderName];

                    // Filter: require at least 1/3 of all possible dates
                    if (records.length < requiredDates) return;

                    let value;
                    if (valueType === 'final') {
                        // Get the last record of the year
                        const lastRecord = records[records.length - 1];
                        value = getRatingValue(lastRecord, ratingType);
                    } else if (valueType === 'best') {
                        // Get the maximum rating across all records
                        value = Math.max(...records.map(r => getRatingValue(r, ratingType)));
                    } else { // average
                        // Get the average rating across all records
                        const ratings = records.map(r => getRatingValue(r, ratingType));
                        value = ratings.reduce((a, b) => a + b, 0) / ratings.length;
                    }

                    riderValues[riderName] = value;
                });

                // Calculate bike values based on valueType
                const bikeValues = {};
                Object.keys(bikes).forEach(bikeName => {
                    const records = bikes[bikeName];

                    // Filter: require at least 1/3 of all possible dates
                    if (records.length < requiredDates) return;

                    let value;
                    if (valueType === 'final') {
                        // Get the last record of the year
                        const lastRecord = records[records.length - 1];
                        value = getRatingValue(lastRecord, ratingType);
                    } else if (valueType === 'best') {
                        // Get the maximum rating across all records
                        value = Math.max(...records.map(r => getRatingValue(r, ratingType)));
                    } else { // average
                        // Get the average rating across all records
                        const ratings = records.map(r => getRatingValue(r, ratingType));
                        value = ratings.reduce((a, b) => a + b, 0) / ratings.length;
                    }

                    bikeValues[bikeName] = value;
                });

                // Sort riders by value
                const sortedRiders = Object.keys(riderValues)
                    .map(name => ({ name, value: riderValues[name] }))
                    .sort((a, b) => b.value - a.value);

                // Sort bikes by value
                const sortedBikes = Object.keys(bikeValues)
                    .map(name => ({ name, value: bikeValues[name] }))
                    .sort((a, b) => b.value - a.value);

                // Get top 3 riders and best bike
                const top3Riders = sortedRiders.slice(0, 3);
                const bestBike = sortedBikes.length > 0 ? sortedBikes[0] : null;

                yearlyData.push({
                    year,
                    riders: top3Riders,
                    bike: bestBike
                });
            });

            // Sort years in descending order
            yearlyData.sort((a, b) => b.year - a.year);

            // Destroy existing DataTable if it exists
            if ($.fn.DataTable.isDataTable('#yearlyTable')) {
                $('#yearlyTable').DataTable().destroy();
            }

            // Render table
            let html = '';
            yearlyData.forEach(data => {
                const rider1 = data.riders[0] || null;
                const rider2 = data.riders[1] || null;
                const rider3 = data.riders[2] || null;
                const bike = data.bike;

                html += `
                    <tr>
                        <td>${data.year}</td>
                        <td>${rider1 ? rider1.name : 'N/A'}</td>
                        <td>${rider1 ? rider1.value.toFixed(2) : 'N/A'}</td>
                        <td>${rider2 ? rider2.name : 'N/A'}</td>
                        <td>${rider2 ? rider2.value.toFixed(2) : 'N/A'}</td>
                        <td>${rider3 ? rider3.name : 'N/A'}</td>
                        <td>${rider3 ? rider3.value.toFixed(2) : 'N/A'}</td>
                        <td>${bike ? removeBikeYear(bike.name) : 'N/A'}</td>
                        <td>${bike ? bike.value.toFixed(2) : 'N/A'}</td>
                    </tr>
                `;
            });

            $('#yearlyTableBody').html(html);

            // Initialize DataTables
            $('#yearlyTable').DataTable({
                order: [[0, 'desc']], // Sort by Year column descending
                pageLength: 25,
                lengthMenu: [[10, 25, 50, -1], [10, 25, 50, "All"]],
                language: {
                    search: "Search years:",
                    lengthMenu: "Show _MENU_ years per page",
                    info: "Showing _START_ to _END_ of _TOTAL_ years",
                    infoEmpty: "No years to display",
                    infoFiltered: "(filtered from _MAX_ total years)"
                }
            });
        }
    </script>
